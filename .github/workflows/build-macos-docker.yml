name: Build macOS Docker Launcher

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos-docker:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Docker launcher app
        run: pyinstaller build_macos_docker.spec

      - name: Create distribution bundle
        run: |
          BUNDLE="dist/MedicalRAG-Docker"
          mkdir -p "$BUNDLE"

          # Copy the launcher .app
          cp -R "dist/MedicalRAG-Docker.app" "$BUNDLE/"

          # Copy Docker files
          cp docker-compose.yml "$BUNDLE/"
          cp Dockerfile "$BUNDLE/"
          cp docker-entrypoint.sh "$BUNDLE/"
          cp .env.example "$BUNDLE/.env.example"
          cp .env.example "$BUNDLE/.env"
          cp requirements-prod.txt "$BUNDLE/"
          cp app.py "$BUNDLE/"

          # Copy application source
          cp -R src "$BUNDLE/src"
          cp -R api "$BUNDLE/api"
          cp -R static "$BUNDLE/static"

          # Copy PDFs
          mkdir -p "$BUNDLE/pdfs"
          cp pdfs/*.pdf "$BUNDLE/pdfs/" 2>/dev/null || true

          # Copy docs
          cp DOCKER_SETUP.md "$BUNDLE/" 2>/dev/null || true
          cp QUICK_START_DOCKER.txt "$BUNDLE/" 2>/dev/null || true

          # Create a stop script as backup
          echo '#!/bin/bash' > "$BUNDLE/stop.sh"
          echo 'docker compose down' >> "$BUNDLE/stop.sh"
          echo 'echo "Stopped."' >> "$BUNDLE/stop.sh"
          chmod +x "$BUNDLE/stop.sh"

          # Create the zip
          cd dist
          zip -r MedicalRAG-Docker-macOS.zip MedicalRAG-Docker/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedicalRAG-Docker-macOS
          path: dist/MedicalRAG-Docker-macOS.zip
          retention-days: 90

      - name: Create Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/MedicalRAG-Docker-macOS.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
