services:
  # Ollama service for embeddings and LLM generation
  ollama:
    image: ollama/ollama:latest
    container_name: medical-rag-ollama
    ports:
      - "11434:11434"
    volumes:
      # Persist Ollama models (5GB+)
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Resource limits to prevent overconsumption
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    # Optional: GPU support (requires nvidia-docker and NVIDIA GPU)
    # Uncomment the following lines to enable GPU:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Medical Research RAG application
  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
      # Build for linux/amd64 platform (Windows compatibility)
      platforms:
        - linux/amd64
    container_name: medical-rag-app
    ports:
      - "8000:8000"
    volumes:
      # Bind mount for user PDFs (users drop PDFs here)
      - ./pdfs:/app/pdfs
      # Named volume for ChromaDB vector database (CRITICAL - contains all ingested knowledge)
      - vector_db:/app/vector_db
      # Named volume for caches and progress tracking (performance optimization)
      - data_cache:/app/data
      # Named volume for logs (fixes Windows permission issues)
      - logs_data:/app/logs
    environment:
      # Ollama configuration
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=deepseek-r1:7b
      - OLLAMA_EMBEDDING_MODEL=nomic-embed-text

      # Optional: Override default RAG configuration
      # - CHUNK_SIZE=512
      # - CHUNK_OVERLAP=50
      # - TOP_K_RESULTS=5
      # - TEMPERATURE=0.7

      # Paths (already set to defaults, but can be overridden)
      # - PDF_FOLDER=./pdfs
      # - DATA_FOLDER=./data
      # - VECTOR_DB_PATH=./vector_db
      # - LOG_FILE=./logs/rag_pipeline.log
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits to prevent overconsumption
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

# Named volumes for persistent data
volumes:
  # Ollama models storage (5GB+)
  ollama_data:
    driver: local

  # ChromaDB vector database (CRITICAL - contains all embeddings and metadata)
  vector_db:
    driver: local

  # Embedding cache and ingestion progress (improves performance)
  data_cache:
    driver: local

  # Application logs (fixes Windows permission issues with bind mounts)
  logs_data:
    driver: local
