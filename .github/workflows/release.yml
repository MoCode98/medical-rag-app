name: Release Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true

jobs:
  build-and-publish:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: github.event_name == 'release'

    - name: Extract version from tag
      id: version
      run: |
        if [ "${{ github.event_name }}" == "release" ]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        fi

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: ${{ github.event_name == 'release' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/medical-rag:latest
          ${{ secrets.DOCKER_USERNAME }}/medical-rag:${{ steps.version.outputs.VERSION }}
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Create release artifacts
      run: |
        mkdir -p release-artifacts
        cp docker-compose.yml release-artifacts/
        cp DOCKER_SETUP.md release-artifacts/
        cp QUICK_START_DOCKER.txt release-artifacts/
        cp QUICK_START_WEB_UI.txt release-artifacts/
        tar -czf release-artifacts/medical-rag-docker-${{ steps.version.outputs.VERSION }}.tar.gz \
          docker-compose.yml DOCKER_SETUP.md QUICK_START_DOCKER.txt QUICK_START_WEB_UI.txt

    - name: Upload release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-artifacts
        path: release-artifacts/

  create-windows-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    if: github.event_name == 'release'

    steps:
    - uses: actions/checkout@v4

    - name: Install Inno Setup
      run: |
        choco install innosetup -y
      shell: powershell

    - name: Build installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
      shell: powershell

    - name: Upload installer
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./installer_output/MedicalResearchRAG_Setup.exe
        asset_name: MedicalResearchRAG_Setup.exe
        asset_content_type: application/octet-stream
