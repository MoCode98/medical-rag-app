name: Build Windows Docker Launcher

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows-docker:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Docker launcher exe
        run: pyinstaller build_windows_docker.spec

      - name: Create distribution bundle
        shell: pwsh
        run: |
          $bundle = "dist/MedicalRAG-Docker"
          New-Item -ItemType Directory -Force -Path $bundle

          # Copy the launcher exe
          Copy-Item "dist/MedicalRAG-Docker.exe" "$bundle/"

          # Copy Docker files
          Copy-Item "docker-compose.yml" "$bundle/"
          Copy-Item "Dockerfile" "$bundle/"
          Copy-Item "docker-entrypoint.sh" "$bundle/"
          Copy-Item ".env.example" "$bundle/.env.example"
          Copy-Item ".env.example" "$bundle/.env"
          Copy-Item "requirements-prod.txt" "$bundle/"
          Copy-Item "app.py" "$bundle/"

          # Copy application source
          Copy-Item -Recurse "src" "$bundle/src"
          Copy-Item -Recurse "api" "$bundle/api"
          Copy-Item -Recurse "static" "$bundle/static"

          # Copy PDFs
          New-Item -ItemType Directory -Force -Path "$bundle/pdfs"
          if (Test-Path "pdfs/*.pdf") {
            Copy-Item "pdfs/*.pdf" "$bundle/pdfs/"
          }

          # Copy docs
          if (Test-Path "DOCKER_SETUP.md") { Copy-Item "DOCKER_SETUP.md" "$bundle/" }
          if (Test-Path "QUICK_START_DOCKER.txt") { Copy-Item "QUICK_START_DOCKER.txt" "$bundle/" }

          # Create a stop script as backup
          Set-Content -Path "$bundle/stop.bat" -Value "@echo off`ndocker compose down`necho Stopped.`npause"

          # Create the zip
          Compress-Archive -Path $bundle -DestinationPath "dist/MedicalRAG-Docker-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedicalRAG-Docker-Windows
          path: dist/MedicalRAG-Docker-Windows.zip
          retention-days: 90

      - name: Create Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/MedicalRAG-Docker-Windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
