name: Build macOS Application

on:
  # Trigger on push to main branch or tags
  push:
    branches: [ main ]
    tags:
      - 'v*'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-prod.txt

      - name: Build macOS application
        run: |
          pyinstaller build_macos.spec

      - name: Create distribution package
        run: |
          cd dist
          # Create a zip of the .app bundle
          zip -r MedicalRAG-macOS.zip MedicalRAG.app

      - name: Upload macOS application
        uses: actions/upload-artifact@v4
        with:
          name: MedicalRAG-macOS
          path: dist/MedicalRAG-macOS.zip
          retention-days: 90

      - name: Create Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/MedicalRAG-macOS.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
